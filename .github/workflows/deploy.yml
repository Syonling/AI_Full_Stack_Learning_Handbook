# 部署 VitePress 站点到 GitHub Pages
# 触发：push 到 main 分支（也可在 Actions 页面手动触发）
# 前提（只需设置一次）：仓库 Settings → Pages → Build and deployment → Source 选 "GitHub Actions"
name: Deploy VitePress site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pages 官方权限模型，无需配置任何 token
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署；不取消进行中的部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm ci

      - name: Build with VitePress
        # DOCS_BASE 自动取仓库名：无论仓库叫什么，站点都会部署在 /<仓库名>/ 下
        # （如果部署到用户主页仓库 <用户名>.github.io，把下面一行改成 DOCS_BASE: /）
        env:
          DOCS_BASE: /${{ github.event.repository.name }}/
        run: npm run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
